<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Two Machines</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0e14; color: #c9d1d9; }
  .page { display: flex; min-height: 100vh; }
  .waves { display: flex; justify-content: center; padding: 60px 20px 80px; background: #0a0e14; border-top: 1px solid #1c2028; }
  .waves svg { width: 90%; max-width: 720px; }
  .machine { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  .machine:first-child { border-right: 1px solid #1c2028; }
  .machine-title { position: absolute; top: 24px; left: 0; right: 0; text-align: center; }
  .machine-title h2 { font-size: 1.05em; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .machine-title p { font-size: 0.72em; color: #6e7681; max-width: 320px; margin: 0 auto; }
  .machine.a .machine-title h2 { color: #58a6ff; }
  .machine.b .machine-title h2 { color: #f0883e; }
  svg { width: 94%; max-width: 580px; height: auto; }
  @media (max-width: 960px) { .page { flex-direction: column; height: auto; } .machine { min-height: 100vh; padding: 20px; } .machine:first-child { border-right: none; border-bottom: 1px solid #1c2028; } }
</style>
</head>
<body>
<div class="page">

<!-- ======================== PLAN A ======================== -->
<div class="machine a">
  <div class="machine-title">
    <h2>Plan A &mdash; Thin Dispatcher</h2>
    <p>Same phases, but the loop is phase-blind. A routing table maps phases to agent identities. The domain logic lives in the agents.</p>

    <defs>
      <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#484f58"/></marker>

    <!-- DONE exit -->

    <text x="86" y="78" text-anchor="middle" font-size="7" fill="#6e7681">DONE? exit</text>

    <!-- Stop 1: phase -->

    <text x="86" y="226" text-anchor="middle" font-size="8" fill="#58a6ff" font-weight="600">config</text>

    <text x="86" y="363" text-anchor="middle" font-size="7.5" fill="#3fb950" font-weight="600">advance</text>

    <!-- Phase row: SPLIT -->

    <rect x="166" y="300" width="340" height="18" rx="4" fill="#0d1117" stroke="#3fb95033" stroke-width="1" opacity="0.12"/>

    <!-- Separator before advance -->
    <line x1="166" y1="308" x2="510" y2="308" stroke="#1c3a1c" stroke-width="1"/>

    <!-- advance() section -->

    <text x="260" y="326" font-size="7.5" fill="#8b949e">runs scripts &rarr; deterministic next phase</text>
    <text x="178" y="342" font-size="7" fill="#6e7681">decisions (reassess? split? retry?) are Python, not LLM</text>

    <!-- ======= AGENT FAN-OUT ======= -->

    <!-- Label -->
    <text x="340" y="416" text-anchor="middle" font-size="9" fill="#a371f7" font-weight="700">Agent Fan-out</text>
    <text x="340" y="430" text-anchor="middle" font-size="7.5" fill="#6e7681">N agents run the same prompt template in parallel, one per RFE</text>

    <!-- Green advance spine from routing table through fan-out rows -->
    <line x1="164" y1="390" x2="164" y2="586" stroke="#3fb950" stroke-width="2" opacity="0.35"/>
    <text x="152" y="508" font-size="7.5" fill="#3fb950" transform="rotate(-90,152,508)" text-anchor="middle" font-weight="600">advance()</text>

    <!-- Advance arrows to each row -->
    <path d="M164,454 L218,454" stroke="#3fb950" stroke-width="1.3" fill="none" marker-end="url(#a-green)"/>
    <path d="M164,502 L218,502" stroke="#3fb950" stroke-width="1.3" fill="none" marker-end="url(#a-green)"/>
    <path d="M164,550 L218,550" stroke="#3fb950" stroke-width="1.3" fill="none" marker-end="url(#a-green)"/>

    <!-- ======= FETCH row ======= -->
    <rect x="220" y="442" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="243" y="459" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">FETCH</text>
    <rect x="272" y="442" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="295" y="459" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">FETCH</text>
    <rect x="324" y="442" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="347" y="459" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">FETCH</text>
    <rect x="376" y="442" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="399" y="459" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">FETCH</text>
    <rect x="432" y="444" width="36" height="22" rx="3" fill="none" stroke="#484f5866" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="450" y="459" text-anchor="middle" font-size="7" fill="#484f58">...</text>

    <!-- BARRIER (labeled — first one explains the concept) -->
    <line x1="174" y1="476" x2="490" y2="476" stroke="#484f58" stroke-width="2.5" opacity="0.5"/>
    <text x="492" y="479" font-size="6" fill="#484f58">barrier &mdash; all</text>
    <text x="492" y="488" font-size="6" fill="#484f58">must complete</text>

    <!-- ======= ASSESS row ======= -->
    <rect x="220" y="490" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="243" y="507" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">ASSESS</text>
    <rect x="272" y="490" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="295" y="507" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">ASSESS</text>
    <rect x="324" y="490" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="347" y="507" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">ASSESS</text>
    <rect x="376" y="490" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="399" y="507" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">ASSESS</text>
    <rect x="432" y="492" width="36" height="22" rx="3" fill="none" stroke="#484f5866" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="450" y="507" text-anchor="middle" font-size="7" fill="#484f58">...</text>

    <!-- BARRIER -->
    <line x1="174" y1="524" x2="490" y2="524" stroke="#484f58" stroke-width="2.5" opacity="0.5"/>

    <!-- ======= REVIEW row ======= -->
    <rect x="220" y="538" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="243" y="555" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">REVIEW</text>
    <rect x="272" y="538" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="295" y="555" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">REVIEW</text>
    <rect x="324" y="538" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="347" y="555" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">REVIEW</text>
    <rect x="376" y="538" width="46" height="26" rx="4" fill="#1f1a2e" stroke="#a371f7" stroke-width="1.2"/>
    <text x="399" y="555" text-anchor="middle" font-size="6.5" fill="#a371f7" font-weight="600">REVIEW</text>
    <rect x="432" y="540" width="36" height="22" rx="3" fill="none" stroke="#484f5866" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="450" y="555" text-anchor="middle" font-size="7" fill="#484f58">...</text>

    <!-- BARRIER -->
    <line x1="174" y1="572" x2="490" y2="572" stroke="#484f58" stroke-width="2.5" opacity="0.5"/>

    <!-- More phases -->
    <text x="350" y="592" text-anchor="middle" font-size="7.5" fill="#6e7681">...more phases (revise, split, reassess, retry, etc.)</text>

    <!-- Disk arrow from fan-out to results -->

  </svg>
</div>

<!-- ======================== PLAN B ======================== -->
<div class="machine b">
  <div class="machine-title">
    <h2>Plan B &mdash; Flat State Machine</h2>
    <p>A loop with a switch-case. At each phase, the LLM drops into a branch with phase-specific instructions.</p>
  </div>
  <svg viewBox="0 0 540 890">
    <defs>
      <marker id="b1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#484f58"/></marker>
      <marker id="b-orange" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f0883e"/></marker>
      <marker id="b-purple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#a371f7"/></marker>
      <marker id="b-yellow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#d29922"/></marker>
      <marker id="b-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#3fb950"/></marker>
      <filter id="glow-b"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- ======= MAIN LOOP (left spine) ======= -->
    <!-- Vertical spine -->
    <line x1="80" y1="120" x2="80" y2="560" stroke="#f0883e" stroke-width="2" opacity="0.3"/>

    <!-- Loop-back arrow (left side, bottom back to top) -->
    <path d="M80,560 C20,560 20,120 80,120" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#b-orange)"/>
    <text x="28" y="340" font-size="8" fill="#f0883e" transform="rotate(-90,28,340)" text-anchor="middle" opacity="0.7">loop back</text>

    <!-- DONE exit -->
    <rect x="48" y="90" width="64" height="20" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="104" text-anchor="middle" font-size="7.5" fill="#6e7681">DONE? exit</text>

    <!-- ======= get-phase (top of loop) ======= -->
    <circle cx="80" cy="140" r="18" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
    <text x="80" y="136" text-anchor="middle" font-size="7" fill="#f0883e" font-weight="600">get-</text>
    <text x="80" y="148" text-anchor="middle" font-size="7" fill="#f0883e" font-weight="600">phase</text>

    <!-- Switch label -->
    <text x="140" y="142" font-size="9" fill="#f0883e" font-weight="700">switch(phase)</text>
    <path d="M98,140 L126,140" stroke="#f0883e" stroke-width="1.2" fill="none" marker-end="url(#b-orange)"/>

    <!-- ======= BRANCH: FETCH ======= -->
    <circle cx="80" cy="200" r="6" fill="#f0883e" opacity="0.5"/>
    <path d="M86,200 L150,200" stroke="#f0883e88" stroke-width="1.2" fill="none"/>
    <rect x="152" y="180" width="340" height="44" rx="6" fill="#1a130808" stroke="#f0883e55" stroke-width="1"/>
    <text x="166" y="196" font-size="9" fill="#f0883e" font-weight="700">FETCH</text>
    <text x="166" y="212" font-size="7.5" fill="#8b949e">For each ID where task file missing: launch fetch agent</text>
    <text x="166" y="222" font-size="7.5" fill="#8b949e">(template: fetch-agent.md). Poll. Verify. set-phase SETUP</text>
    <!-- Agent icon -->
    <rect x="454" y="188" width="30" height="28" rx="4" fill="#14112a" stroke="#a371f7" stroke-width="1"/>
    <text x="469" y="206" text-anchor="middle" font-size="7" fill="#a371f7">A</text>

    <!-- ======= BRANCH: ASSESS ======= -->
